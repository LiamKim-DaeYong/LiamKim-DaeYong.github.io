<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">MySQL Thread Model Comparison</title>
  <desc id="desc">Comparison between one-thread-per-connection and thread pool models.</desc>

  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 600 16px Arial, sans-serif; fill: #374151; }
      .label { font: 500 13px Arial, sans-serif; fill: #374151; }
      .small { font: 500 12px Arial, sans-serif; fill: #4b5563; }
      .box { rx: 10; ry: 10; stroke: #94a3b8; stroke-width: 1.5; fill: #f8fafc; }
      .client { rx: 7; ry: 7; fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.2; }
      .worker { rx: 7; ry: 7; fill: #dcfce7; stroke: #4ade80; stroke-width: 1.2; }
      .queue { rx: 7; ry: 7; fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.2; }
      .cpu { rx: 8; ry: 8; fill: #fee2e2; stroke: #f87171; stroke-width: 1.4; }
      .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect x="20" y="20" width="560" height="520" class="box" />
  <rect x="620" y="20" width="560" height="520" class="box" />

  <text x="300" y="58" text-anchor="middle" class="title">One Thread Per Connection</text>
  <text x="300" y="82" text-anchor="middle" class="small">Connections and worker threads grow together</text>

  <text x="900" y="58" text-anchor="middle" class="title">Thread Pool</text>
  <text x="900" y="82" text-anchor="middle" class="small">Many connections share limited workers</text>

  <!-- Left panel clients -->
  <rect x="70" y="130" width="90" height="34" class="client" />
  <text x="115" y="152" text-anchor="middle" class="label">Conn 1</text>
  <rect x="70" y="180" width="90" height="34" class="client" />
  <text x="115" y="202" text-anchor="middle" class="label">Conn 2</text>
  <rect x="70" y="230" width="90" height="34" class="client" />
  <text x="115" y="252" text-anchor="middle" class="label">Conn 3</text>
  <rect x="70" y="280" width="90" height="34" class="client" />
  <text x="115" y="302" text-anchor="middle" class="label">Conn 4</text>
  <rect x="70" y="330" width="90" height="34" class="client" />
  <text x="115" y="352" text-anchor="middle" class="label">Conn 5</text>
  <rect x="70" y="380" width="90" height="34" class="client" />
  <text x="115" y="402" text-anchor="middle" class="label">Conn 6</text>

  <!-- Left panel workers -->
  <rect x="230" y="130" width="100" height="34" class="worker" />
  <text x="280" y="152" text-anchor="middle" class="label">Thread 1</text>
  <rect x="230" y="180" width="100" height="34" class="worker" />
  <text x="280" y="202" text-anchor="middle" class="label">Thread 2</text>
  <rect x="230" y="230" width="100" height="34" class="worker" />
  <text x="280" y="252" text-anchor="middle" class="label">Thread 3</text>
  <rect x="230" y="280" width="100" height="34" class="worker" />
  <text x="280" y="302" text-anchor="middle" class="label">Thread 4</text>
  <rect x="230" y="330" width="100" height="34" class="worker" />
  <text x="280" y="352" text-anchor="middle" class="label">Thread 5</text>
  <rect x="230" y="380" width="100" height="34" class="worker" />
  <text x="280" y="402" text-anchor="middle" class="label">Thread 6</text>

  <rect x="400" y="120" width="110" height="304" class="cpu" />
  <text x="455" y="278" text-anchor="middle" class="subtitle">CPU</text>

  <!-- Left panel arrows -->
  <line x1="160" y1="147" x2="230" y2="147" class="arrow" />
  <line x1="160" y1="197" x2="230" y2="197" class="arrow" />
  <line x1="160" y1="247" x2="230" y2="247" class="arrow" />
  <line x1="160" y1="297" x2="230" y2="297" class="arrow" />
  <line x1="160" y1="347" x2="230" y2="347" class="arrow" />
  <line x1="160" y1="397" x2="230" y2="397" class="arrow" />

  <line x1="330" y1="147" x2="400" y2="147" class="arrow" />
  <line x1="330" y1="197" x2="400" y2="197" class="arrow" />
  <line x1="330" y1="247" x2="400" y2="247" class="arrow" />
  <line x1="330" y1="297" x2="400" y2="297" class="arrow" />
  <line x1="330" y1="347" x2="400" y2="347" class="arrow" />
  <line x1="330" y1="397" x2="400" y2="397" class="arrow" />

  <text x="300" y="470" text-anchor="middle" class="small">More connections usually mean more active threads.</text>

  <!-- Right panel clients -->
  <rect x="670" y="130" width="90" height="34" class="client" />
  <text x="715" y="152" text-anchor="middle" class="label">Conn 1</text>
  <rect x="670" y="180" width="90" height="34" class="client" />
  <text x="715" y="202" text-anchor="middle" class="label">Conn 2</text>
  <rect x="670" y="230" width="90" height="34" class="client" />
  <text x="715" y="252" text-anchor="middle" class="label">Conn 3</text>
  <rect x="670" y="280" width="90" height="34" class="client" />
  <text x="715" y="302" text-anchor="middle" class="label">Conn 4</text>
  <rect x="670" y="330" width="90" height="34" class="client" />
  <text x="715" y="352" text-anchor="middle" class="label">Conn 5</text>
  <rect x="670" y="380" width="90" height="34" class="client" />
  <text x="715" y="402" text-anchor="middle" class="label">Conn 6</text>

  <!-- Right panel queue -->
  <rect x="810" y="120" width="120" height="304" class="queue" />
  <text x="870" y="256" text-anchor="middle" class="subtitle">Request</text>
  <text x="870" y="280" text-anchor="middle" class="subtitle">Queue</text>

  <!-- Right panel workers -->
  <text x="1035" y="170" text-anchor="middle" class="subtitle">Worker Pool</text>
  <rect x="980" y="190" width="110" height="34" class="worker" />
  <text x="1035" y="212" text-anchor="middle" class="label">Worker 1</text>
  <rect x="980" y="240" width="110" height="34" class="worker" />
  <text x="1035" y="262" text-anchor="middle" class="label">Worker 2</text>
  <rect x="980" y="290" width="110" height="34" class="worker" />
  <text x="1035" y="312" text-anchor="middle" class="label">Worker 3</text>

  <rect x="1120" y="182" width="55" height="160" class="cpu" />
  <text x="1148" y="268" text-anchor="middle" class="subtitle">CPU</text>

  <!-- Right panel arrows -->
  <line x1="760" y1="147" x2="810" y2="147" class="arrow" />
  <line x1="760" y1="197" x2="810" y2="197" class="arrow" />
  <line x1="760" y1="247" x2="810" y2="247" class="arrow" />
  <line x1="760" y1="297" x2="810" y2="297" class="arrow" />
  <line x1="760" y1="347" x2="810" y2="347" class="arrow" />
  <line x1="760" y1="397" x2="810" y2="397" class="arrow" />

  <line x1="930" y1="207" x2="980" y2="207" class="arrow" />
  <line x1="930" y1="257" x2="980" y2="257" class="arrow" />
  <line x1="930" y1="307" x2="980" y2="307" class="arrow" />

  <line x1="1090" y1="207" x2="1120" y2="207" class="arrow" />
  <line x1="1090" y1="257" x2="1120" y2="257" class="arrow" />
  <line x1="1090" y1="307" x2="1120" y2="307" class="arrow" />

  <text x="900" y="470" text-anchor="middle" class="small">Many connections share fewer worker threads.</text>
</svg>
