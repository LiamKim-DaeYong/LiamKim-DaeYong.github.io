<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Thread Pool Variables Map (Percona Server)</title>
  <desc id="desc">Visual map of Percona Server thread pool variables: thread_pool_size, thread_pool_oversubscribe, thread_pool_stall_limit, and thread_pool_max_threads.</desc>

  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 15px Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 13px Arial, sans-serif; fill: #374151; }
      .box { rx: 12; ry: 12; stroke-width: 1.6; }
      .arrow { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <text x="600" y="52" text-anchor="middle" class="title">Thread Pool 변수 한눈에 보기 (Percona 기준)</text>

  <!-- Request input -->
  <rect x="60" y="140" width="220" height="120" class="box" fill="#dbeafe" stroke="#60a5fa" />
  <text x="170" y="185" text-anchor="middle" class="subtitle">Incoming</text>
  <text x="170" y="210" text-anchor="middle" class="subtitle">Requests</text>
  <text x="170" y="236" text-anchor="middle" class="small">연결/요청 유입</text>

  <!-- Thread groups -->
  <rect x="350" y="96" width="500" height="360" class="box" fill="#f8fafc" stroke="#94a3b8" />
  <text x="600" y="128" text-anchor="middle" class="subtitle">Thread Groups</text>
  <text x="600" y="150" text-anchor="middle" class="small">group count = thread_pool_size</text>

  <!-- Group A -->
  <rect x="385" y="180" width="205" height="240" class="box" fill="#ecfeff" stroke="#22d3ee" />
  <text x="488" y="206" text-anchor="middle" class="label">Group A</text>
  <rect x="410" y="228" width="156" height="36" class="box" fill="#dcfce7" stroke="#4ade80" />
  <text x="488" y="250" text-anchor="middle" class="small">Active workers</text>
  <rect x="410" y="278" width="156" height="36" class="box" fill="#fef3c7" stroke="#f59e0b" />
  <text x="488" y="300" text-anchor="middle" class="small">Extra workers</text>
  <text x="488" y="322" text-anchor="middle" class="small">(oversubscribe)</text>

  <!-- Group B -->
  <rect x="610" y="180" width="205" height="240" class="box" fill="#ecfeff" stroke="#22d3ee" />
  <text x="712" y="206" text-anchor="middle" class="label">Group B</text>
  <rect x="634" y="228" width="156" height="36" class="box" fill="#dcfce7" stroke="#4ade80" />
  <text x="712" y="250" text-anchor="middle" class="small">Active workers</text>
  <rect x="634" y="278" width="156" height="36" class="box" fill="#fef3c7" stroke="#f59e0b" />
  <text x="712" y="300" text-anchor="middle" class="small">Extra workers</text>
  <text x="712" y="322" text-anchor="middle" class="small">(oversubscribe)</text>

  <text x="600" y="438" text-anchor="middle" class="small">thread_pool_oversubscribe는 그룹당 추가 실행 허용량</text>

  <!-- Max threads cap -->
  <rect x="340" y="82" width="520" height="388" class="box" fill="none" stroke="#ef4444" />
  <text x="600" y="492" text-anchor="middle" class="small">전체 워커 상한 = thread_pool_max_threads</text>

  <!-- Stall timer -->
  <rect x="920" y="140" width="230" height="150" class="box" fill="#fef9c3" stroke="#eab308" />
  <text x="1035" y="184" text-anchor="middle" class="subtitle">Stall Check</text>
  <text x="1035" y="208" text-anchor="middle" class="small">thread_pool_stall_limit</text>
  <text x="1035" y="232" text-anchor="middle" class="small">시간 이상 지연 시</text>
  <text x="1035" y="256" text-anchor="middle" class="small">추가 워커 검토</text>

  <!-- Arrows -->
  <line x1="280" y1="200" x2="350" y2="200" class="arrow" />
  <line x1="850" y1="210" x2="920" y2="210" class="arrow" />
  <line x1="920" y1="250" x2="850" y2="300" class="arrow" />

  <!-- Legend -->
  <rect x="60" y="490" width="1090" height="100" class="box" fill="#ffffff" stroke="#d1d5db" />
  <text x="85" y="520" class="label">해석 순서</text>
  <text x="85" y="545" class="small">1) thread_pool_size로 그룹 수를 정한다.</text>
  <text x="85" y="567" class="small">2) 각 그룹은 기본 워커로 처리하고, 필요 시 oversubscribe만큼 추가 실행을 허용한다.</text>
  <text x="640" y="545" class="small">3) 지연이 stall_limit을 넘으면 추가 워커를 검토한다.</text>
  <text x="640" y="567" class="small">4) 전체 워커 수는 max_threads 상한을 넘지 않는다.</text>
</svg>
